name: Nix project setup
description: Checkout repository, install Nix, and enter devShell

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ github.token }}

    - name: Enter Nix devShell
      uses: nicknovitski/nix-develop@v1
